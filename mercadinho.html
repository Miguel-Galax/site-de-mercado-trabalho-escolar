<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Escolar Online</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: #f4f4f9; display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: #ffb703; color: white; padding: 20px; text-align: center; }
        main { display: flex; flex: 1; padding: 20px; gap: 20px; flex-wrap: wrap; justify-content: center; }
        
        .produtos-container { display: flex; gap: 20px; flex-wrap: wrap; flex: 2; }
        .card { background: white; border-radius: 8px; padding: 15px; width: 200px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card img { width: 100px; height: 100px; object-fit: cover; margin-bottom: 10px; }
        .card h3 { font-size: 18px; margin-bottom: 5px; }
        .card p { color: #555; margin-bottom: 15px; }
        .card button { background-color: #023047; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; }
        .card button:hover { background-color: #ffb703; }

        .carrinho-container { background: white; border-radius: 8px; padding: 20px; flex: 1; min-width: 300px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); height: fit-content; }
        .carrinho-container h2 { margin-bottom: 15px; color: #023047; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .lista-itens { list-style: none; margin-bottom: 15px; }
        .lista-itens li { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .total { font-size: 18px; font-weight: bold; margin-bottom: 15px; display: block; }
        .btn-pagar { background-color: #219ebc; color: white; border: none; padding: 12px; border-radius: 5px; width: 100%; font-size: 16px; cursor: pointer; }
        .btn-pagar:hover { background-color: #023047; }
    </style>
</head>
<body>

    <header>
        <h1>🛒 Mercado Escolar</h1>
    </header>

    <main>
        <div class="produtos-container">
            <div class="card">
                <img src="https://unsplash.com" alt="Leite">
                <h3>Leite Integral</h3>
                <p>15 Pontos</p>
                <button onclick="adicionarItem('Leite Integral', 15)">Adicionar</button>
            </div>
            <div class="card">
                <img src="https://unsplash.com" alt="Ovos">
                <h3>Cartela de Ovos</h3>
                <p>30 Pontos</p>
                <button onclick="adicionarItem('Cartela de Ovos', 30)">Adicionar</button>
            </div>
            <div class="card">
                <img src="https://unsplash.com" alt="Farinha">
                <h3>Farinha de Trigo</h3>
                <p>10 Pontos</p>
                <button onclick="adicionarItem('Farinha de Trigo', 10)">Adicionar</button>
            </div>
            <div class="card">
                <img src="https://unsplash.com" alt="Fermento">
                <h3>Fermento em Pó</h3>
                <p>20 Pontos</p>
                <button onclick="adicionarItem('Fermento em Pó', 20)">Adicionar</button>
            </div>
        </div>

        <div class="carrinho-container">
            <h2>Carrinho</h2>
            <ul class="lista-itens" id="lista-itens">
                <li style="color: #888;">Nenhum item adicionado.</li>
            </ul>
            <span class="total" id="total">Total: 0 Pontos</span>
            <button class="btn-pagar" onclick="finalizarCompra()">Finalizar com Pontos</button>
        </div>
    </main>

    <script>
        let carrinho = [];
        let total = 0;

        function adicionarItem(nome, preco) {
            carrinho.push({ nome, preco });
            total += preco;
            atualizarCarrinho();
        }

        function atualizarCarrinho() {
            const lista = document.getElementById('lista-itens');
            const totalTexto = document.getElementById('total');
            
            lista.innerHTML = '';
            
            if (carrinho.length === 0) {
                lista.innerHTML = '<li style="color: #888;">Nenhum item adicionado.</li>';
            } else {
                carrinho.forEach(item => {
                    const li = document.createElement('li');
                    li.textContent = `${item.nome} - ${item.preco} pts`;
                    lista.appendChild(li);
                });
            }
            
            totalTexto.textContent = `Total: ${total} Pontos`;
        }

        function finalizarCompra() {
            if (carrinho.length === 0) {
                alert('Seu carrinho está vazio! Adicione ingredientes primeiro.');
            } else {
                alert(`Compra de ${total} Pontos finalizada com sucesso! Parabéns pela tarefa escolar!`);
                carrinho = [];
                total = 0;
                atualizarCarrinho();
            }
        }
    </script>
</body>
</html>
