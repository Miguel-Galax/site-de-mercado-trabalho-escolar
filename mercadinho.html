<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Escolar Online - Detalhes e Exclusão</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: #f4f4f9; display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: #ffb703; color: white; padding: 20px; text-align: center; }
        main { display: flex; flex: 1; padding: 20px; gap: 20px; flex-wrap: wrap; justify-content: center; position: relative; }
        
        /* Lista de Produtos */
        .produtos-container { display: flex; gap: 20px; flex-wrap: wrap; flex: 2; }
        .card { background: white; border-radius: 8px; padding: 15px; width: 200px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s; }
        .card:hover { transform: scale(1.03); }
        .card img { width: 100px; height: 100px; object-fit: cover; margin-bottom: 10px; pointer-events: none; }
        .card h3 { font-size: 18px; margin-bottom: 5px; pointer-events: none; }
        .card p { color: #555; margin-bottom: 10px; font-weight: bold; pointer-events: none; }
        .card .btn-ver { background-color: #023047; color: white; border: none; padding: 8px; border-radius: 5px; width: 100%; cursor: pointer; }

        /* Carrinho de Compras */
        .carrinho-container { background: white; border-radius: 8px; padding: 20px; flex: 1; min-width: 300px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); height: fit-content; }
        .carrinho-container h2 { margin-bottom: 15px; color: #023047; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .lista-itens { list-style: none; margin-bottom: 15px; }
        .lista-itens li { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
        .btn-excluir { background-color: #e63946; color: white; border: none; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-excluir:hover { background-color: #c1121f; }
        .total { font-size: 18px; font-weight: bold; margin-bottom: 15px; display: block; }
        .btn-pagar { background-color: #219ebc; color: white; border: none; padding: 12px; border-radius: 5px; width: 100%; font-size: 16px; cursor: pointer; }
        .btn-pagar:hover { background-color: #023047; }

        /* Janela de Detalhes (Modal) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 10; }
        .modal-conteudo { background: white; padding: 30px; border-radius: 8px; max-width: 400px; width: 90%; text-align: center; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .modal-conteudo img { width: 150px; height: 150px; object-fit: cover; margin-bottom: 15px; }
        .modal-conteudo h2 { margin-bottom: 10px; color: #023047; }
        .modal-conteudo .preco-detalhe { font-size: 22px; color: #219ebc; font-weight: bold; margin-bottom: 15px; }
        .modal-conteudo p { color: #666; margin-bottom: 20px; font-size: 14px; }
        .btn-adicionar-modal { background-color: #ffb703; color: #023047; font-weight: bold; border: none; padding: 12px; border-radius: 5px; width: 100%; cursor: pointer; font-size: 16px; margin-bottom: 10px; }
        .btn-adicionar-modal:hover { background-color: #fb8500; }
        .btn-fechar { background: none; border: none; font-size: 20px; position: absolute; top: 10px; right: 15px; cursor: pointer; color: #888; }
    </style>
</head>
<body>

    <header>
        <h1>🛒 Mercado Escolar</h1>
    </header>

    <main>
        <!-- Seção de Produtos -->
        <div class="produtos-container">
            <div class="card" onclick="abrirDetalhes('Leite Integral', 15, 'https://unsplash.com', 'Leite integral fresco, rico em cálcio. Perfeito para bolos e massas.')">
                <img src="https://unsplash.com" alt="Leite">
                <h3>Leite Integral</h3>
                <p>15 Pontos</p>
                <button class="btn-ver">Ver Detalhes</button>
            </div>
            
            <div class="card" onclick="abrirDetalhes('Cartela de Ovos', 30, 'https://unsplash.com', 'Ovos brancos selecionados e frescos. Essencial para dar estrutura à sua receita.')">
                <img src="https://unsplash.com" alt="Ovos">
                <h3>Cartela de Ovos</h3>
                <p>30 Pontos</p>
                <button class="btn-ver">Ver Detalhes</button>
            </div>

            <div class="card" onclick="abrirDetalhes('Farinha de Trigo', 10, 'https://unsplash.com', 'Farinha de trigo tipo 1, ideal para massas leves, pães e bolos fofinhos.')">
                <img src="https://unsplash.com" alt="Farinha">
                <h3>Farinha de Trigo</h3>
                <p>10 Pontos</p>
                <button class="btn-ver">Ver Detalhes</button>
            </div>

            <div class="card" onclick="abrirDetalhes('Fermento em Pó', 20, 'https://unsplash.com', 'Fermento químico em pó de ação rápida para fazer seus bolos crescerem.')">
                <img src="https://unsplash.com" alt="Fermento">
                <h3>Fermento em Pó</h3>
                <p>20 Pontos</p>
                <button class="btn-ver">Ver Detalhes</button>
            </div>
        </div>

        <!-- Seção do Carrinho -->
        <div class="carrinho-container">
            <h2>Carrinho</h2>
            <ul class="lista-itens" id="lista-itens">
                <li style="color: #888;">Nenhum item adicionado.</li>
            </ul>
            <span class="total" id="total">Total: 0 Pontos</span>
            <button class="btn-pagar" onclick="finalizarCompra()">Finalizar com Pontos</button>
        </div>
    </main>

    <!-- Tela Invisível de Detalhes (Modal) -->
    <div class="modal" id="modal-detalhes">
        <div class="modal-conteudo">
            <button class="btn-fechar" onclick="fecharDetalhes()">&times;</button>
            <img id="modal-img" src="" alt="">
            <h2 id="modal-nome"></h2>
            <div class="preco-detalhe" id="modal-preco"></div>
            <p id="modal-descricao"></p>
            <button class="btn-adicionar-modal" id="btn-adicionar-carrinho">Adicionar ao Carrinho</button>
        </div>
    </div>

    <script>
        let carrinho = [];
        let total = 0;
        let produtoAtual = null;

        // Função que abre a tela de detalhes igual ao Mercado Livre
        function abrirDetalhes(nome, preco, imagem, descricao) {
            produtoAtual = { nome, preco };
            
            document.getElementById('modal-nome').textContent = nome;
            document.getElementById('modal-preco').textContent = `${preco} Pontos`;
            document.getElementById('modal-img').src = imagem;
            document.getElementById('modal-descricao').textContent = descricao;
            
            // Configura o botão interno da tela de detalhes para adicionar o item correto
            document.getElementById('btn-adicionar-carrinho').onclick = function() {
                adicionarItem(produtoAtual.nome, produtoAtual.preco);
                fecharDetalhes();
            };

            document.getElementById('modal-detalhes').style.display = 'flex';
        }

        function fecharDetalhes() {
            document.getElementById('modal-detalhes').style.display = 'none';
        }

        // Adiciona o item ao vetor do carrinho
        function adicionarItem(nome, preco) {
            carrinho.push({ nome, preco });
            calcularTotal();
            atualizarCarrinho();
        }

        // Remove o item usando a posição (índice) dele na lista
        function removerItem(index) {
            carrinho.splice(index, 1);
            calcularTotal();
            atualizarCarrinho();
        }

        function calcularTotal() {
            total = carrinho.reduce((soma, item) => soma + item.preco, 0);
        }

        // Desenha a lista atualizada com o botão "Excluir" do lado de cada item
        function atualizarCarrinho() {
            const lista = document.getElementById('lista-itens');
            const totalTexto = document.getElementById('total');
            
            lista.innerHTML = '';
            
            if (carrinho.length === 0) {
                lista.innerHTML = '<li style="color: #888;">Nenhum item adicionado.</li>';
            } else {
                carrinho.forEach((item, index) => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <span>${item.nome} (${item.preco} pts)</span>
                        <button class="btn-excluir" onclick="removerItem(${index})">Excluir</button>
                    `;
                    lista.appendChild(li);
                });
            }
            
            totalTexto.textContent = `Total: ${total} Pontos`;
        }

        function finalizarCompra() {
            if (carrinho.length === 0) {
                alert('Seu carrinho está vazio! Adicione ingredientes primeiro.');
            } else {
                alert(`Compra de ${total} Pontos finalizada com sucesso! Sem uso de dinheiro real.`);
                carrinho = [];
                total = 0;
                atualizarCarrinho();
            }
        }
    </script>
</body>
</html>
