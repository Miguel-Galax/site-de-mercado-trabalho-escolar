<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Escolar</title>
    <!-- Mantenha seus estilos CSS aqui ou linke seu arquivo externo -->
    <style>
        /* Seus estilos originais da print */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: #f4f4f9; display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: #ffb703; color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
        main { display: flex; flex: 1; padding: 20px; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .produtos-container { display: flex; gap: 20px; flex-wrap: wrap; flex: 2; }
        .card { background: white; border-radius: 8px; padding: 15px; width: 200px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card:hover { transform: scale(1.03); }
        .card img { width: 100px; height: 100px; object-fit: cover; margin-bottom: 10px; }
        .card h1 { font-size: 18px; margin-bottom: 5px; }
        .card p { color: #555; margin-bottom: 10px; font-weight: bold; }
        .btn-ver { background-color: #023047; color: white; border: none; padding: 8px; border-radius: 5px; width: 100%; cursor: pointer; text-decoration: none; display: inline-block; }
        
        /* Carrinho */
        .carrinho-container { background: white; border-radius: 8px; padding: 20px; flex: 1; min-width: 300px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); height: fit-content; }
        .carrinho-container h2 { margin-bottom: 15px; color: #023047; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .lista-itens { list-style: none; margin-bottom: 15px; }
        .lista-itens li { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
        .btn-excluir { background-color: #e63946; color: white; border: none; padding: 3px 8px; border-radius: 4px; cursor: pointer; }
        .total { font-size: 18px; font-weight: bold; margin-bottom: 15px; display: block; }
        .btn-pagar { background-color: #219ebc; color: white; border: none; padding: 12px; border-radius: 5px; width: 100%; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <header>🛒 Mercado Escolar</header>

    <main>
        <!-- Lista de Produtos -->
        <div class="produtos-container">
            <!-- Leite -->
            <div class="card">
                <img src="https://placeholder.com" alt="Leite">
                <h1>Leite Integral</h1>
                <p>15 Pontos</p>
                <a href="leite.html" class="btn-ver">Ver Detalhes</a>
            </div>
            <!-- Ovos -->
            <div class="card">
                <img src="https://placeholder.com" alt="Ovos">
                <h1>Cartela de Ovos</h1>
                <p>30 Pontos</p>
                <a href="ovos.html" class="btn-ver">Ver Detalhes</a>
            </div>
            <!-- Farinha -->
            <div class="card">
                <img src="https://placeholder.com" alt="Farinha">
                <h1>Farinha de Trigo</h1>
                <p>10 Pontos</p>
                <a href="farinha.html" class="btn-ver">Ver Detalhes</a>
            </div>
            <!-- Açúcar -->
            <div class="card">
                <img src="https://placeholder.com" alt="Açúcar">
                <h1>Açúcar</h1>
                <p>12 Pontos</p>
                <a href="acucar.html" class="btn-ver">Ver Detalhes</a>
            </div>
        </div>

        <!-- Carrinho de Compras -->
        <div class="carrinho-container">
            <h2>Carrinho</h2>
            <ul class="lista-itens" id="itens-carrinho">
                <!-- Itens entram aqui via JS -->
            </ul>
            <span class="total">Total: <span id="total-pontos">0</span> Pontos</span>
            <button class="btn-pagar">Finalizar com Pontos</button>
        </div>
    </main>

    <script>
        // Função para renderizar o carrinho na tela inicial
        function atualizarCarrinho() {
            const carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
            const lista = document.getElementById('itens-carrinho');
            const totalSpan = document.getElementById('total-pontos');
            
            lista.innerHTML = '';
            let total = 0;

            if (carrinho.length === 0) {
                lista.innerHTML = '<li style="color:#888;">Nenhum item adicionado.</li>';
            } else {
                carrinho.forEach((item, index) => {
                    total += item.pontos;
                    lista.innerHTML += `
                        <li>
                            ${item.nome} (${item.pontos} Pts)
                            <button class="btn-excluir" onclick="removerItem(${index})">X</button>
                        </li>
                    `;
                });
            }
            totalSpan.innerText = total;
        }

        function removerItem(index) {
            let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
            carrinho.splice(index, 1);
            localStorage.setItem('carrinho', JSON.stringify(carrinho));
            atualizarCarrinho();
        }

        // Executa ao carregar a página
        window.onload = atualizarCarrinho;

                // Função para renderizar o carrinho na tela inicial
        function atualizarCarrinho() {
            const carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
            const lista = document.getElementById('itens-carrinho');
            const totalSpan = document.getElementById('total-pontos');
            
            lista.innerHTML = '';
            let total = 0;

            if (carrinho.length === 0) {
                lista.innerHTML = '<li style="color:#888;">Nenhum item adicionado.</li>';
            } else {
                carrinho.forEach((item, index) => {
                    total += item.pontos;
                    lista.innerHTML += `
                        <li>
                            ${item.nome} (${item.pontos} Pts)
                            <button class="btn-excluir" onclick="removerItem(${index})">X</button>
                        </li>
                    `;
                });
            }
            totalSpan.innerText = total;
        }

        function removerItem(index) {
            let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
            carrinho.splice(index, 1);
            localStorage.setItem('carrinho', JSON.stringify(carrinho));
            atualizarCarrinho();
        }

        // --- NOVA FUNÇÃO: Finalizar a Compra ---
        function finalizarCompra() {
            const carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
            
            // Valida se o carrinho está vazio
            if (carrinho.length === 0) {
                alert("Seu carrinho está vazio! Adicione produtos antes de finalizar.");
                return;
            }

            // Calcula o total gasto
            let total = 0;
            carrinho.forEach(item => total += item.pontos);

            // Mensagem de sucesso para o usuário
            alert(`Compra realizada com sucesso!\nVocê utilizou ${total} pontos.`);

            // Limpa o carrinho do localStorage e atualiza a tela
            localStorage.removeItem('carrinho');
            atualizarCarrinho();
        }

        // Executa ao carregar a página e mapeia o botão de finalizar
        window.onload = function() {
            atualizarCarrinho();
            
            // Vincula o clique do botão à função de finalização
            const btnPagar = document.querySelector('.btn-pagar');
            if (btnPagar) {
                btnPagar.addEventListener('click', finalizarCompra);
            }
        };
    </script>

</body>
</html>
